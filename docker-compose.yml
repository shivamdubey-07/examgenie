services:

  api:
    build: .
    container_name: examgenie_api
    restart: always
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  worker:
    build: .
    container_name: examgenie_worker
    restart: always
    env_file:
      - .env
    command: celery -A app.worker.celery_app worker -l info --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "active"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  db:
    image: postgres:16
    container_name: examgenie_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - examgenie_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: examgenie_redis
    restart: always
    volumes:
      - examgenie_redis:/data
    command: redis-server
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  frontend:
    build:
      context: ../examgenie_frontend
      dockerfile: Dockerfile
    container_name: examgenie_frontend
    restart: always
    environment:
      - VITE_API_URL=http://localhost/api
    expose:
      - "5173"
    volumes:
      - ../examgenie_frontend:/app
      - examgenie_frontend_node:/app/node_modules
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: examgenie_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - examgenie_minio:/data
    ports:
      - "9001:9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb myminio/$$S3_BUCKET || true;
      mc policy set public myminio/$$S3_BUCKET || true;
      exit 0;
      "

  nginx:
    image: nginx:stable-alpine
    container_name: examgenie_nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  examgenie_db:
    driver: local
  examgenie_minio:
    driver: local
  examgenie_redis:
    driver: local
  examgenie_frontend_node:
    driver: local
