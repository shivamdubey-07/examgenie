# Nginx Configuration Files
#
# This directory contains environment-specific nginx configurations:
#
# nginx.dev.conf  - Development configuration
#                   - Proxies frontend to Vite dev server (5173)
#                   - Proxies API to backend (8000)
#                   - Supports WebSocket for HMR
#                   - Used by: docker-compose.yml
#
# nginx.prod.conf - Production configuration
#                   - Serves static frontend files from dist/
#                   - HTTPS enabled with SSL
#                   - Sets caching headers for static assets
#                   - Proxies API to backend
#                   - Used by: docker-compose.prod.yml
#
# Quick Start:
# - Development: docker-compose up -d (uses nginx.dev.conf)
# - Production:  docker-compose -f docker-compose.prod.yml up -d (uses nginx.prod.conf)
#
# For actual configuration, refer to the specific files above.
# This file is a reference only and is NOT used by docker-compose.
